x-app-base: &app-base
  env_file: .env
  restart: unless-stopped

x-airflow-base: &airflow-base
  build:
    context: .
    dockerfile: Dockerfile
    target: airflow
  image: ${AIRFLOW_IMAGE_NAME:-competency-system/airflow:latest}
  env_file: .env
  restart: unless-stopped
  volumes:
    - ${DOCKER_HOST:-/run/user/1000/docker.sock}:/var/run/docker.sock
  depends_on:
    postgres:
      condition: service_healthy
    airflow-init:
      condition: service_completed_successfully

services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}

      # variables for backend app
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "5432:5432"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:8.6.2-alpine
    command:
      - redis-server
      - --appendonly yes
      - --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m

  migrate:
    <<: *app-base
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: competency-system/api:latest
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  api:
    <<: *app-base
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: competency-system/api:latest
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512m

  celery-worker:
    <<: *app-base
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: competency-system/worker:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1g

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: airflow
    image: ${AIRFLOW_IMAGE_NAME:-competency-system/airflow:latest}
    env_file: .env
    volumes:
      - ${DOCKER_SOCKET}:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: >
      sh -c "airflow db migrate
      && (airflow users create
          --username ${AIRFLOW_USERNAME}
          --password ${AIRFLOW_PASSWORD}
          --firstname Airflow
          --lastname Admin
          --role Admin
          --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
          || true)"
    restart: "no"

  airflow-webserver:
    <<: *airflow-base
    ports:
      - "8080:8080"
    command: airflow webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m

  airflow-scheduler:
    <<: *airflow-base
    command: airflow scheduler
    healthcheck:
      test:
        [
          "CMD",
          "airflow",
          "jobs",
          "check",
          "--job-type",
          "SchedulerJob",
          "--hostname",
          "$$HOSTNAME",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m

  airflow-triggerer:
    <<: *airflow-base
    command: airflow triggerer
    healthcheck:
      test:
        [
          "CMD",
          "airflow",
          "jobs",
          "check",
          "--job-type",
          "TriggererJob",
          "--hostname",
          "$$HOSTNAME",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
