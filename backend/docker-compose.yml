x-app-base: &app-base
  env_file: .env
  restart: unless-stopped

x-airflow-base: &airflow-base
  build:
    context: .
    dockerfile: Dockerfile
    target: airflow
  image: ${AIRFLOW_IMAGE_NAME:-competency-system/airflow:latest}
  env_file: .env
  restart: unless-stopped
  volumes:
    - ${DOCKER_SOCKET}:/var/run/docker.sock
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    airflow-init:
      condition: service_completed_successfully
  group_add:
    - "${DOCKER_GID}"

services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}

      # variables for backend app
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "1432:5432"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:8.6.2-alpine
    command:
      - redis-server
      - --appendonly yes
      - --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "1379:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m

  migrate:
    <<: *app-base
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: competency-system/api:latest
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  api:
    <<: *app-base
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: competency-system/api:latest
    ports:
      - "1000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512m

  celery-worker:
    <<: *app-base
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: competency-system/worker:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: >
      bash -lc "/app/.venv/bin/celery -A competency_system.presentation.worker.celery_worker:celery_app worker --loglevel info --queues ${CELERY_QUEUE_NAME:-llm_jobs} --concurrency ${CELERY_WORKER_CONCURRENCY:-2} --max-tasks-per-child ${CELERY_MAX_TASKS_PER_CHILD:-100} ${CELERY_WORKER_EXTRA_FLAGS:---without-gossip --without-mingle --without-heartbeat}"
    healthcheck:
      test: >
        bash -c "
          celery -A competency_system.presentation.worker.celery_worker:celery_app inspect ping || exit 1
        "
      interval: 30s
      timeout: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: airflow
    image: ${AIRFLOW_IMAGE_NAME:-competency-system/airflow:latest}
    env_file: .env
    volumes:
      - ${DOCKER_SOCKET}:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: >
      bash -c "airflow db migrate"
    restart: "no"

  airflow-webserver:
    <<: *airflow-base
    hostname: airflow-webserver
    ports:
      - "8080:8080"
    command: airflow api-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m

  airflow-scheduler:
    <<: *airflow-base
    hostname: airflow-scheduler
    command: bash -c "airflow dags reserialize && airflow scheduler"
    environment:
      AIRFLOW__API__BASE_URL: http://airflow-webserver:8080
    healthcheck:
      test: >
        bash -c "
          airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1
        "
      interval: 30s
      timeout: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m

  airflow-triggerer:
    <<: *airflow-base
    command: bash -c "airflow triggerer"
    healthcheck:
      test: >
        bash -c "
          airflow jobs check --job-type TriggererJob --hostname $(hostname) || exit 1
        "
      interval: 30s
      timeout: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  airflow_logs:
    driver: local
