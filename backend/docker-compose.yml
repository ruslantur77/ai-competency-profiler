version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:-password}",
      ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: competency-system/api:latest
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: app
      DB_USER: app
      DB_PASS: app
      API_KEY: ${API_KEY:-}
      BASE_URL: ${BASE_URL:-https://openrouter.ai/api/v1}
      MODEL: ${MODEL:-openai/gpt-oss-20b:free}
      CODE_PROMPT_VERSION: ${CODE_PROMPT_VERSION:-v1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEBUG: ${DEBUG:-false}
      LLM_QUEUE_BACKEND: ${LLM_QUEUE_BACKEND:-inmemory}
      REDIS_HOST: ${REDIS_HOST:-127.0.0.1}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      CELERY_QUEUE_NAME: ${CELERY_QUEUE_NAME:-llm_jobs}
      CELERY_RESULT_EXPIRES_SECONDS: ${CELERY_RESULT_EXPIRES_SECONDS:-86400}
      CELERY_RETRY_ATTEMPTS: ${CELERY_RETRY_ATTEMPTS:-3}
      CELERY_RETRY_BACKOFF_SECONDS: ${CELERY_RETRY_BACKOFF_SECONDS:-2}
      CELERY_RETRY_BACKOFF_MAX_SECONDS: ${CELERY_RETRY_BACKOFF_MAX_SECONDS:-30}
      TESTING_SYSTEM_BASE_URL: ${TESTING_SYSTEM_BASE_URL:-http://localhost:9000}
      TESTING_SYSTEM_API_TOKEN: ${TESTING_SYSTEM_API_TOKEN:-}
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src:cached
      - ./alembic:/app/alembic:cached
    depends_on:
      postgres:
        condition: service_healthy

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: competency-system/api:latest
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: app
      DB_USER: app
      DB_PASS: app
      API_KEY: ${API_KEY:-}
      BASE_URL: ${BASE_URL:-https://openrouter.ai/api/v1}
      MODEL: ${MODEL:-openai/gpt-oss-20b:free}
      VACANCY_PROMPT_VERSION: ${VACANCY_PROMPT_VERSION:-v1}
      TASK_PROMPT_VERSION: ${TASK_PROMPT_VERSION:-v1}
      CODE_PROMPT_VERSION: ${CODE_PROMPT_VERSION:-v1}
      LLM_MAX_PARALLEL_REQUESTS: ${LLM_MAX_PARALLEL_REQUESTS:-4}
      LLM_STAGE_TIMEOUT_SECONDS: ${LLM_STAGE_TIMEOUT_SECONDS:-45}
      LLM_MAX_SUGGESTED_NEW_PER_STAGE: ${LLM_MAX_SUGGESTED_NEW_PER_STAGE:-5}
      LLM_QUEUE_BACKEND: celery
      REDIS_HOST: ${REDIS_HOST:-127.0.0.1}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      CELERY_QUEUE_NAME: ${CELERY_QUEUE_NAME:-llm_jobs}
      CELERY_RESULT_EXPIRES_SECONDS: ${CELERY_RESULT_EXPIRES_SECONDS:-86400}
      CELERY_RETRY_ATTEMPTS: ${CELERY_RETRY_ATTEMPTS:-3}
      CELERY_RETRY_BACKOFF_SECONDS: ${CELERY_RETRY_BACKOFF_SECONDS:-2}
      CELERY_RETRY_BACKOFF_MAX_SECONDS: ${CELERY_RETRY_BACKOFF_MAX_SECONDS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEBUG: ${DEBUG:-false}
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src:cached
      - ./alembic:/app/alembic:cached
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      celery -A competency_system.presentation.worker.celery_worker:celery_app
      worker --loglevel ${LOG_LEVEL:-info}
      --queues ${CELERY_QUEUE_NAME:-llm_jobs}
    command: >
      uvicorn competency_system.presentation.api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level ${LOG_LEVEL:-info}

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: airflow
    image: ${AIRFLOW_IMAGE_NAME:-competency-system/airflow:latest}
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: app
      DB_USER: app
      DB_PASS: app
      API_KEY: ${API_KEY:-}
      BASE_URL: ${BASE_URL:-https://openrouter.ai/api/v1}
      MODEL: ${MODEL:-openai/gpt-oss-20b:free}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEBUG: ${DEBUG:-false}
      TESTING_SYSTEM_BASE_URL: ${TESTING_SYSTEM_BASE_URL:-http://localhost:9000}
      TESTING_SYSTEM_API_TOKEN: ${TESTING_SYSTEM_API_TOKEN:-}
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: DockerExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /app/src/competency_system/presentation/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src:cached
      - ./alembic:/app/alembic:cached
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -lc "airflow db migrate && (airflow users create
      --username ${AIRFLOW_USERNAME:-admin}
      --password ${AIRFLOW_PASSWORD:-admin}
      --firstname Airflow
      --lastname Admin
      --role Admin
      --email admin@example.com || true)"

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
      target: airflow
    image: ${AIRFLOW_IMAGE_NAME:-competency-system/airflow:latest}
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: app
      DB_USER: app
      DB_PASS: app
      API_KEY: ${API_KEY:-}
      BASE_URL: ${BASE_URL:-https://openrouter.ai/api/v1}
      MODEL: ${MODEL:-openai/gpt-oss-20b:free}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEBUG: ${DEBUG:-false}
      TESTING_SYSTEM_BASE_URL: ${TESTING_SYSTEM_BASE_URL:-http://localhost:9000}
      TESTING_SYSTEM_API_TOKEN: ${TESTING_SYSTEM_API_TOKEN:-}
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: DockerExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /app/src/competency_system/presentation/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src:cached
      - ./alembic:/app/alembic:cached
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: airflow webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: airflow
    image: ${AIRFLOW_IMAGE_NAME:-competency-system/airflow:latest}
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: app
      DB_USER: app
      DB_PASS: app
      API_KEY: ${API_KEY:-}
      BASE_URL: ${BASE_URL:-https://openrouter.ai/api/v1}
      MODEL: ${MODEL:-openai/gpt-oss-20b:free}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEBUG: ${DEBUG:-false}
      TESTING_SYSTEM_BASE_URL: ${TESTING_SYSTEM_BASE_URL:-http://localhost:9000}
      TESTING_SYSTEM_API_TOKEN: ${TESTING_SYSTEM_API_TOKEN:-}
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: DockerExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /app/src/competency_system/presentation/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src:cached
      - ./alembic:/app/alembic:cached
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: airflow scheduler

  airflow-triggerer:
    build:
      context: .
      dockerfile: Dockerfile
      target: airflow
    image: ${AIRFLOW_IMAGE_NAME:-competency-system/airflow:latest}
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: app
      DB_USER: app
      DB_PASS: app
      API_KEY: ${API_KEY:-}
      BASE_URL: ${BASE_URL:-https://openrouter.ai/api/v1}
      MODEL: ${MODEL:-openai/gpt-oss-20b:free}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEBUG: ${DEBUG:-false}
      TESTING_SYSTEM_BASE_URL: ${TESTING_SYSTEM_BASE_URL:-http://localhost:9000}
      TESTING_SYSTEM_API_TOKEN: ${TESTING_SYSTEM_API_TOKEN:-}
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: DockerExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /app/src/competency_system/presentation/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src:cached
      - ./alembic:/app/alembic:cached
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: airflow triggerer

volumes:
  postgres_data:
  redis_data:
