events {}
http {
    resolver 127.0.0.11 valid=10s;
    server {
        listen 80;
        location / {
            set $upstream http://blue_api:8000;
            proxy_pass $upstream;
        }
        location /airflow/ {
            set $upstream http://blue_airflow-webserver:8080;
            proxy_pass $upstream;
        }
    }
}