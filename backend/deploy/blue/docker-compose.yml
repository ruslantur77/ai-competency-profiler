x-app-base: &app-base
  restart: unless-stopped
  env_file: ${ENV_FILE}
  networks:
    - shared_net

x-airflow-base: &airflow-base
  image: ghcr.io/ruslantur77/airflow:${IMAGE_TAG}
  env_file: ${ENV_FILE}
  restart: unless-stopped
  volumes:
    - ${DOCKER_SOCKET}:/var/run/docker.sock
    - airflow_logs:/opt/airflow/logs
  depends_on:
    airflow-init:
      condition: service_completed_successfully
  group_add:
    - "${DOCKER_GID}"
  networks:
    - shared_net

services:
  migrate:
    <<: *app-base
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    image: ghcr.io/ruslantur77/api:${IMAGE_TAG}
    command: alembic upgrade head
    restart: "no"

  api:
    <<: *app-base
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    image: ghcr.io/ruslantur77/api:${IMAGE_TAG}
    ports:
      - "1000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      shared_net:
        aliases:
          - blue_api

  celery-worker:
    <<: *app-base
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    image: ghcr.io/ruslantur77/worker:${IMAGE_TAG}
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: >
      bash -lc "/app/.venv/bin/celery -A competency_system.presentation.worker.celery_worker:celery_app worker --loglevel info --queues ${CELERY_QUEUE_NAME:-llm_jobs} --concurrency ${CELERY_WORKER_CONCURRENCY:-2} --max-tasks-per-child ${CELERY_MAX_TASKS_PER_CHILD:-100} ${CELERY_WORKER_EXTRA_FLAGS:---without-gossip --without-mingle --without-heartbeat}"
    healthcheck:
      test: >
        bash -c "
          celery -A competency_system.presentation.worker.celery_worker:celery_app inspect ping || exit 1
        "
      interval: 30s
      timeout: 30s
      retries: 3

  airflow-init:
    image: ghcr.io/ruslantur77/airflow:${IMAGE_TAG}
    env_file: ${ENV_FILE}
    volumes:
      - ${DOCKER_SOCKET}:/var/run/docker.sock
    depends_on:
      migrate:
        condition: service_completed_successfully
    group_add:
      - "${DOCKER_GID}"
    command: >
      bash -c "airflow db migrate"
    restart: "no"
    networks:
      - shared_net

  airflow-webserver:
    <<: *airflow-base
    hostname: airflow-webserver
    ports:
      - "2000:8080"
    command: airflow api-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      shared_net:
        aliases:
          - blue_airflow-webserver

  airflow-scheduler:
    <<: *airflow-base
    hostname: airflow-scheduler
    command: bash -c "airflow dags reserialize && airflow scheduler"
    environment:
      AIRFLOW__API__BASE_URL: http://airflow-webserver:8080
    healthcheck:
      test: >
        bash -c "
          airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1
        "
      interval: 30s
      timeout: 30s
      retries: 3

  airflow-triggerer:
    <<: *airflow-base
    command: airflow triggerer
    healthcheck:
      test: >
        bash -c "
          airflow jobs check --job-type TriggererJob --hostname $(hostname) || exit 1
        "
      interval: 30s
      timeout: 30s
      retries: 3

networks:
  shared_net:
    external: true
    name: app_shared_net

volumes:
  airflow_logs:
    driver: local
