name: CI

on:
  push:
    paths:
      - "backend/**"
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    paths:
      - "backend/**"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    if: github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')

    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.0

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen --all-groups

      - name: Ruff check
        working-directory: backend
        run: uv run ruff check src

      - name: Mypy
        working-directory: backend
        run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.0

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen --all-groups

      - name: Pytest
        working-directory: backend
        env:
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_PORT: 5432
          TEST_DB_NAME: app
          TEST_DB_USER: app
          TEST_DB_PASS: app
        run: uv run pytest

  build:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        image: [api, worker, airflow]
    outputs:
      full_image: ${{ steps.full-image.outputs.full_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Log in to the Container registry
        uses: docker/login-action@v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ${{ env.REGISTRY }}/ruslantur77/${{ matrix.image }}
          tags: |
            type=sha,format=short
            type=ref,event=tag

      - name: Set full image with SHA
        id: full-image
        run: |
          SHA_TAG=$(echo "${{ steps.meta.outputs['tag-names'] }}" | tr ',' '\n' | grep '^sha-' | head -n1)
          if [ -z "$SHA_TAG" ]; then
            SHA_TAG=$(git rev-parse --short HEAD)
            SHA_TAG="sha-$SHA_TAG"
          fi
          echo "full_image=${{ env.REGISTRY }}/ruslantur77/${{ matrix.image }}:${SHA_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.19.2
        with:
          context: backend
          push: true
          target: ${{ matrix.image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set API image
        id: api-image
        run: echo "value=${{ env.REGISTRY }}/ruslantur77/api:sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          # =========================
          # Application Settings
          # =========================
          LOG_LEVEL=${{ vars.LOG_LEVEL }}
          DEBUG=${{ vars.DEBUG }}
          ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}

          # =========================
          # Database Configuration
          # =========================
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}

          # =========================
          # LLM Configuration
          # =========================
          API_KEY=${{ secrets.API_KEY }}
          BASE_URL=${{ vars.BASE_URL }}
          MODEL=${{ vars.MODEL }}
          VACANCY_PROMPT_VERSION=${{ vars.VACANCY_PROMPT_VERSION }}
          TASK_PROMPT_VERSION=${{ vars.TASK_PROMPT_VERSION }}
          CODE_PROMPT_VERSION=${{ vars.CODE_PROMPT_VERSION }}
          LLM_MAX_PARALLEL_REQUESTS=${{ vars.LLM_MAX_PARALLEL_REQUESTS }}
          LLM_STAGE_TIMEOUT_SECONDS=${{ vars.LLM_STAGE_TIMEOUT_SECONDS }}
          LLM_MAX_SUGGESTED_NEW_PER_STAGE=${{ vars.LLM_MAX_SUGGESTED_NEW_PER_STAGE }}
          LLM_REASONING_MAX_TOKENS=${{ vars.LLM_REASONING_MAX_TOKENS }}
          LLM_QUEUE_BACKEND=${{ vars.LLM_QUEUE_BACKEND }}

          # =========================
          # External Testing System
          # =========================
          TESTING_SYSTEM_BASE_URL=${{ vars.TESTING_SYSTEM_BASE_URL }}
          TESTING_SYSTEM_API_TOKEN=${{ secrets.TESTING_SYSTEM_API_TOKEN }}

          # =========================
          # Airflow Configuration
          # =========================
          AIRFLOW__API_AUTH__JWT_ISSUER=${{ secrets.AIRFLOW__API_AUTH__JWT_ISSUER }}
          AIRFLOW__API_AUTH__JWT_SECRET=${{ secrets.AIRFLOW__API_AUTH__JWT_SECRET }}
          AIRFLOW__API__SECRET_KEY=${{ secrets.AIRFLOW__API__SECRET_KEY }}
          AIRFLOW__API__AUTH_BACKENDS=${{ vars.AIRFLOW__API__AUTH_BACKENDS }}
          AIRFLOW__API__BASE_URL=${{ vars.AIRFLOW__API__BASE_URL }}

          AIRFLOW__CORE__EXECUTOR=${{ vars.AIRFLOW__CORE__EXECUTOR }}
          AIRFLOW__CORE__DAGS_FOLDER=${{ vars.AIRFLOW__CORE__DAGS_FOLDER }}
          AIRFLOW__CORE__LOAD_EXAMPLES=${{ vars.AIRFLOW__CORE__LOAD_EXAMPLES }}
          AIRFLOW__CORE__FERNET_KEY=${{ secrets.AIRFLOW__CORE__FERNET_KEY }}
          AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG=${{ vars.AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG }}
          AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG=${{ vars.AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG }}
          AIRFLOW__CORE__PARALLELISM=${{ vars.AIRFLOW__CORE__PARALLELISM }}

          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${{ secrets.AIRFLOW__DATABASE__SQL_ALCHEMY_CONN }}

          AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL=${{ vars.AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL }}

          AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL=${{ vars.AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL }}
          AIRFLOW__SCHEDULER__PARSING_PROCESSES=${{ vars.AIRFLOW__SCHEDULER__PARSING_PROCESSES }}

          AIRFLOW__LOGGING__BASE_LOG_FOLDER=${{ vars.AIRFLOW__LOGGING__BASE_LOG_FOLDER }}

          AIRFLOW__WEBSERVER__BASE_URL=${{ vars.AIRFLOW__WEBSERVER__BASE_URL }}
          AIRFLOW_DOCKER_NETWORK=${{ vars.AIRFLOW_DOCKER_NETWORK }}
          TASK_SYNC_IMAGE=${{ steps.api-image.outputs.value }}

          # =========================
          # Security
          # =========================
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          JWT_ALGORITHM=${{ secrets.JWT_ALGORITHM }}
          ACCESS_TOKEN_EXPIRE_MINUTES=${{ vars.ACCESS_TOKEN_EXPIRE_MINUTES }}
          REFRESH_TOKEN_EXPIRE_DAYS=${{ vars.REFRESH_TOKEN_EXPIRE_DAYS }}
          AUTH_COOKIE_SECURE=${{ vars.AUTH_COOKIE_SECURE }}
          AUTH_COOKIE_SAMESITE=${{ vars.AUTH_COOKIE_SAMESITE }}
          BOOTSTRAP_ADMIN_EMAIL=${{ secrets.BOOTSTRAP_ADMIN_EMAIL }}
          BOOTSTRAP_ADMIN_PASSWORD=${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}

          # =========================
          # Redis
          # =========================
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_PORT=${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}

          # =========================
          # Celery
          # =========================
          CELERY_QUEUE_NAME=${{ vars.CELERY_QUEUE_NAME }}
          CELERY_RESULT_EXPIRES_SECONDS=${{ vars.CELERY_RESULT_EXPIRES_SECONDS }}
          CELERY_RETRY_ATTEMPTS=${{ vars.CELERY_RETRY_ATTEMPTS }}
          CELERY_RETRY_BACKOFF_SECONDS=${{ vars.CELERY_RETRY_BACKOFF_SECONDS }}
          CELERY_RETRY_BACKOFF_MAX_SECONDS=${{ vars.CELERY_RETRY_BACKOFF_MAX_SECONDS }}
          CELERY_MAX_TASKS_PER_CHILD=${{ vars.CELERY_MAX_TASKS_PER_CHILD }}
          CELERY_WORKER_CONCURRENCY=${{ vars.CELERY_WORKER_CONCURRENCY }}
          CELERY_WORKER_EXTRA_FLAGS=${{ vars.CELERY_WORKER_EXTRA_FLAGS }}

          # =========================
          # Postgres (Airflow)
          # =========================
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}

          # =========================
          # Docker
          # =========================
          DOCKER_SOCKET=${{ vars.DOCKER_SOCKET }}

          EOF

      - name: Backup current deployment on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            BACKUP_DIR=~/backups/$(date +%Y%m%d_%H%M%S)
            mkdir -p ~/backups
            if [ -d ~/app ]; then
              cp -r ~/app "$BACKUP_DIR"
              echo "Backup created: $BACKUP_DIR"
              ls -dt ~/backups/*/ | tail -n +6 | xargs rm -rf
            else
              echo "No existing deployment to backup"
            fi

      - name: Copy files
        run: |
          cp -r backend/deploy .
          cp -r backend/database .

      - name: Copy deployment files via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy/*,database/*,.env
          target: "~/app"

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            FULL_IMAGE="${{ needs.build.outputs.full_image }}"
            IMAGE_TAG="${FULL_IMAGE##*:}"
            echo "Deploying tag: $IMAGE_TAG"

            cd ~/app
            chmod +x deploy/deploy.sh
            ./deploy/deploy.sh $IMAGE_TAG
