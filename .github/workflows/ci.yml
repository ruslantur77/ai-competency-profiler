name: CI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.0

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Ruff check
        run: ruff check src

      - name: Mypy
        run: mypy src

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.0

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Pytest
        env:
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_PORT: 5432
          TEST_DB_NAME: app
          TEST_DB_USER: app
          TEST_DB_PASS: app
        run: pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        image:
          [
            competency-system/api,
            competency-system/worker,
            competency-system/airflow,
          ]
    outputs:
      full_image: ${{ steps.full-image.outputs.full_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Log in to the Container registry
        uses: docker/login-action@v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=sha,format=short
            type=ref,event=branch

      - name: Set full image with SHA
        id: full-image
        run: |
          SHA_TAG=$(echo "${{ steps.meta.outputs['tag-names'] }}" | tr ',' '\n' | grep '^sha-' | head -n1)
          if [ -z "$SHA_TAG" ]; then
            SHA_TAG=$(git rev-parse --short HEAD)
            SHA_TAG="sha-$SHA_TAG"
          fi
          echo "full_image=${{ env.REGISTRY }}/${{ matrix.image }}:${SHA_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
