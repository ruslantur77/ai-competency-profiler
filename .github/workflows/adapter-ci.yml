name: Adapter CI

on:
  push:
    branches: [main, develop]
    paths:
      - "adapter/**"
      - ".github/workflows/adapter-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "adapter/**"

defaults:
  run:
    working-directory: adapter

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        env:
          SOURCE_BASE_URL: http://mock-lms:8080/api/kontest
          SOURCE_API_TOKEN: test-token
          SOURCE_COURSE_IDS: "1"
          COURSE_VACANCY_MAP: '{"1": "40000000-0000-0000-0000-000000000001"}'
          BACKEND_WEBHOOK_URL: http://mock-backend:8000/api/v1/webhook/task-completed
          BACKEND_WEBHOOK_SECRET: test-secret
          DB_PATH: ":memory:"

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./adapter
          push: false
          tags: competency-adapter:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max