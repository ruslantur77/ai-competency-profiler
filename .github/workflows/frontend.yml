name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    paths:
      - "frontend/**"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: frontend

jobs:
  # ===== BUILD IMAGE =====
  build:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Log in to Container registry
        uses: docker/login-action@v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ${{ env.REGISTRY }}/ruslantur77/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=tag

      - name: Set image tag
        id: tag
        run: |
          SHA_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          echo "value=${SHA_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.19.2
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== DEPLOY =====
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Backup current deployment
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            BACKUP_DIR=~/backups/frontend_$(date +%Y%m%d_%H%M%S)
            mkdir -p ~/backups
            if [ -d ~/app/frontend ]; then
              cp -r ~/app/frontend "$BACKUP_DIR"
              echo "Backup created: $BACKUP_DIR"
              ls -dt ~/backups/frontend_*/ 2>/dev/null | tail -n +4 | xargs rm -rf
            fi

      - name: Copy nginx config
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: backend/deploy/nginx/nginx.conf
          target: "~/app"

      - name: Deploy frontend
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
            FRONTEND_IMAGE="ghcr.io/ruslantur77/frontend:${IMAGE_TAG}"

            echo "Deploying frontend: $FRONTEND_IMAGE"

            # Логинимся в ghcr.io
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Тянем новый образ
            docker pull $FRONTEND_IMAGE

            # Останавливаем и удаляем старый контейнер
            docker stop green_frontend 2>/dev/null || true
            docker rm green_frontend 2>/dev/null || true

            # Запускаем новый
            docker run -d \
              --name green_frontend \
              --network green \
              --restart unless-stopped \
              $FRONTEND_IMAGE

            # Перезапускаем nginx чтобы подхватил новый upstream
            docker restart green_nginx 2>/dev/null || true

            echo "Frontend deployed successfully!"

      - name: Health check
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 5
            if curl -sf http://neuroslop.imbalet.ru > /dev/null; then
              echo "✅ Health check passed"
            else
              echo "❌ Health check failed"
              exit 1
            fi